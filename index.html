<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Are Coming Soon</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050816;
      color: #f7f8ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: radial-gradient(circle at top, rgba(96, 165, 250, 0.2), transparent 28%),
                  radial-gradient(circle at right, rgba(168, 85, 247, 0.18), transparent 22%),
                  linear-gradient(180deg, #060a17 0%, #0c1226 100%);
    }

    .card {
      width: min(100%, 760px);
      padding: 3rem;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.14);
      color: #bfdbfe;
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .hero {
      display: grid;
      gap: 1.5rem;
    }

    h1 {
      font-size: clamp(2.4rem, 4vw, 4.1rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }

    p {
      max-width: 44rem;
      font-size: 1.05rem;
      line-height: 1.9;
      color: #cbd5e1;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(80px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .countdown-item {
      padding: 1.35rem;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .countdown-item strong {
      display: block;
      font-size: 1.9rem;
      color: #f8fafc;
      margin-bottom: 0.35rem;
    }

    .countdown-item span {
      color: #94a3b8;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .subscribe {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .subscribe label {
      font-size: 0.95rem;
      color: #94a3b8;
      letter-spacing: 0.02em;
    }

    .subscribe input {
      width: 100%;
      min-height: 3.5rem;
      padding: 0 1rem;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.9);
      color: #f8fafc;
      font-size: 1rem;
    }

    .subscribe button {
      width: 100%;
      min-height: 3.5rem;
      border: none;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .subscribe button:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 2rem;
      color: #64748b;
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: space-between;
    }

    @media (max-width: 600px) {
      .countdown {
        grid-template-columns: repeat(2, minmax(100px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Launch Countdown</div>
    <section class="hero">
      <h1>We are coming soon.</h1>
      <p>Thanks for your interest! Our new site is almost ready. Join the waitlist below to get early access and the latest updates when we launch.</p>
    </section>

    <section class="countdown" aria-label="Countdown timer">
      <div class="countdown-item">
        <strong>18</strong>
        <span>Days</span>
      </div>
      <div class="countdown-item">
        <strong>06</strong>
        <span>Hours</span>
      </div>
      <div class="countdown-item">
        <strong>42</strong>
        <span>Minutes</span>
      </div>
      <div class="countdown-item">
        <strong>12</strong>
        <span>Seconds</span>
      </div>
    </section>

    <form class="subscribe" action="#" method="post">
      <label for="email">Get notified when we launch</label>
      <input id="email" type="email" name="email" placeholder="Enter your email address" required />
      <button type="submit">Notify Me</button>
    </form>

    <div class="footer">
      <span>Shenling Ltd.</span>
      <span>Launching soon — stay tuned.</span>
    </div>
  </main>
</body>
</html>
